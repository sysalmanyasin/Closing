name: Unzip, Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '*.zip'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ZIP=$(ls *.zip | head -1)
          unzip "$ZIP" -d unzipped
          INNER=$(ls unzipped/)
          mv unzipped/$INNER/* . || mv unzipped/* .
          rm -rf unzipped "$ZIP"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
