name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow them to finish unless it's a page deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Your existing deploy jobs go here...

